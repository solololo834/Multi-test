<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Mabar Multiplayer</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin: 0; overflow: hidden; touch-action: none; background: #f0f0f0; }
    #grass { position: fixed; top: 120px; width: 800px; height: 150px; left: -10px; z-index: 1; pointer-events: none; }
    #char { position: fixed; top: 200px; left: 50px; width: 50px; z-index: 5; }
    #joy-container { position: fixed; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(0,0,0,0.1); border-radius: 50%; z-index: 10; display: flex; align-items: center; justify-content: center; }
    #joy-stick { width: 40px; height: 40px; background: #333; border-radius: 50%; position: relative; }
  </style>
</head>
<body>
  <img src="Tak berjudul1538_20260420120144.png" id="grass" />
  <img src="char.png" id="char" />
  <div id="joy-container"><div id="joy-stick"></div></div>

<script>
  const SUPABASE_URL = 'https://aazzodmalsnpvqllhyfd.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhenpvZG1hbHNucHZxbGxoeWZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjI0MTAsImV4cCI6MjA5MjIzODQxMH0.mFbkD2UOFy9KI21z_o4hl5xI8Cd_SPJteIzPkC9t4MA';

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: false }
  });

  const char = document.getElementById('char');
  const stick = document.getElementById('joy-stick');
  const container = document.getElementById('joy-container');

  const myId = 'p_' + Math.random().toString(36).substr(2, 5);
  const remotePlayers = {};
  let charX = 50, charY = 200;
  const limitUp = 150;

  async function initGame() {
    await client.from('players').select('id').limit(1);
    
    client.channel('any')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, payload => {
        if (payload.new && payload.new.id !== myId) updateRemote(payload.new);
      })
      .subscribe();
  }

  function updateRemote(data) {
    if (!remotePlayers[data.id]) {
      const n = document.createElement('img');
      n.src = 'char.png';
      n.style.position = 'fixed';
      n.style.width = '50px';
      n.style.zIndex = '4';
      n.style.opacity = '1';
      n.style.transition = 'left 0.05s linear, top 0.05s linear'; 
      document.body.appendChild(n);
      remotePlayers[data.id] = n;
    }
    remotePlayers[data.id].style.left = data.x + 'px';
    remotePlayers[data.id].style.top = data.y + 'px';
  }

  let isDragging = false;
  container.ontouchstart = (e) => { isDragging = true; e.preventDefault(); };
  window.ontouchmove = e => {
    if (!isDragging) return;
    const t = e.touches[0];
    const r = container.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const dist = Math.min(50, Math.sqrt(dx*dx + dy*dy));
    const ang = Math.atan2(dy, dx);
    const sx = Math.cos(ang) * dist, sy = Math.sin(ang) * dist;
    stick.style.transform = `translate(${sx}px, ${sy}px)`;
    move(sx/6, sy/6);
  };
  window.ontouchend = () => { isDragging = false; stick.style.transform = `translate(0,0)`; };

  let lastSentX = charX;
  let lastSentY = charY;
  let sending = false;

  async function move(dx, dy) {
    charX += dx; charY += dy;
    if (charY < limitUp) charY = limitUp;
    const ld = window.innerHeight - char.offsetHeight;
    if (charY > ld) charY = ld;
    if (charX < 0) charX = 0;
    const lr = window.innerWidth - char.offsetWidth;
    if (charX > lr) charX = lr;

    char.style.left = charX + 'px';
    char.style.top = charY + 'px';

    const distanceMoved = Math.sqrt(Math.pow(charX - lastSentX, 2) + Math.pow(charY - lastSentY, 2));

    if (!sending && distanceMoved > 2) {
      sending = true;
      lastSentX = charX;
      lastSentY = charY;
      try {
        await client.from('players').upsert({ id: myId, x: charX, y: charY });
      } catch (e) {}
      setTimeout(() => { sending = false; }, 30); 
    }
  }

  initGame();
</script>
</body>
</html>
